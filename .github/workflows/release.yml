name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 构建步骤不注入 GH_TOKEN,避免 electron-builder 自行发布与下方脚本重复
      - name: Build Windows installer
        run: npm run dist

      - name: Upload installer + latest.yml to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          T8_RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/release-github.cjs

  mac:
    runs-on: macos-latest
    needs: windows
    env:
      # 无签名证书时跳过 mac 代码签名
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS dmg (arm64 + x64)
        run: npm run dist:mac

      - name: Upload mac artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist_electron/*.dmg \
            dist_electron/*.blockmap \
            dist_electron/latest-mac.yml \
            --clobber
