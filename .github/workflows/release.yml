name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + encrypt backend
        run: npm run prepack:enc

      - name: Prepare runtime archives
        run: npm run prepack:runtimes

      # --publish never: CI 中 electron-builder 检测到 tag 会默认尝试发布,
      # 无 GH_TOKEN 时直接报错;发布统一由下方 release-github.cjs 完成
      - name: Package Windows installer (NSIS)
        run: npx electron-builder --win --x64 --publish never

      - name: Post-build checks
        run: node electron/_post_build.cjs

      - name: Upload installer + latest.yml to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          T8_RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/release-github.cjs

  mac:
    runs-on: macos-latest
    needs: windows
    env:
      # 无签名证书时跳过 mac 代码签名
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + encrypt backend
        run: npm run prepack:enc

      - name: Prepare runtime archives
        run: npm run prepack:runtimes

      - name: Package macOS dmg (arm64 + x64)
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Post-build checks
        run: node electron/_post_build.cjs

      - name: Upload mac artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist_electron/*.dmg \
            dist_electron/*.blockmap \
            dist_electron/latest-mac.yml \
            --clobber
